<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOOD | Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 41, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
            color: var(--text-main); margin: 0; display: flex; justify-content: center;
            min-height: 100vh; padding: 40px 20px;
        }

        .container { width: 100%; max-width: 480px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 28px;
            padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 24px 0; font-weight: 600; font-size: 18px; text-align: center; }
        .label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }

        input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 16px; color: #fff; font-size: 14px;
            margin-bottom: 20px; outline: none;
        }

        button { width: 100%; padding: 14px; border-radius: 16px; border: none; font-weight: 500; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
        
        .key-item {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
        }
        .key-info { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
        .key-id { font-weight: 600; font-size: 14px; color: #fff; display: block; margin-bottom: 4px; }
        .user-tag { color: var(--accent); font-weight: 500; font-size: 11px; background: rgba(99, 102, 241, 0.1); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
        .key-timer { font-size: 11px; color: var(--accent); background: rgba(99, 102, 241, 0.1); padding: 4px 10px; border-radius: 8px; }
        
        .actions { display: grid; grid-template-columns: 45px 1fr 1fr 38px 38px; gap: 6px; }
        .btn-sm { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
        .btn-del { color: var(--danger); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 50px; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div id="toast">Success</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button class="btn-primary" onclick="checkLogin()">Login</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Manage Keys</h2>
            <button class="btn-primary" onclick="generateAndSave()">+ Generate 1 Day Key</button>
        </div>
        <div id="list-container"></div>
    </div>
</div>

<script>
    const BASE_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    let allKeys = {};
    let userLinks = {};

    function checkLogin() {
        if (document.getElementById('adminPass').value === "1122") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            fetchData();
            setInterval(fetchData, 10000);
        } else { alert("Wrong password"); }
    }

    async function fetchData() {
        try {
            const [resKeys, resLinks] = await Promise.all([
                fetch(`${BASE_URL}/keys.json?auth=${DB_SECRET}`),
                fetch(`${BASE_URL}/user_links.json?auth=${DB_SECRET}`)
            ]);
            allKeys = await resKeys.json() || {};
            userLinks = await resLinks.json() || {};
            renderList();
        } catch (e) { console.error(e); }
    }

    function getCountdown(expiry) {
        if (expiry > 2500000000) return "∞ LIFETIME";
        const diff = expiry - Math.floor(Date.now() / 1000);
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60);
        return `${d}d ${h}h ${m}m`;
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";

        // จับคู่ Key กับข้อมูลผู้ใช้
        const keyMap = {};
        Object.entries(userLinks).forEach(([uid, val]) => {
            const k = (typeof val === 'object') ? val.key : val;
            const n = (typeof val === 'object') ? val.name : "Legacy User";
            keyMap[k] = n;
        });

        Object.keys(allKeys).reverse().forEach(id => {
            const item = allKeys[id];
            const userName = keyMap[id];
            
            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-info">
                    <div>
                        <span class="key-id">${id}</span>
                        ${userName ? `<span class="user-tag">👤 ${userName}</span>` : '<span class="user-tag" style="opacity:0.5">Unused</span>'}
                    </div>
                    <span class="key-timer">${getCountdown(item.expiry)}</span>
                </div>
                <div class="actions">
                    <input type="number" id="qty-${id}" value="1" style="margin:0; height:38px; padding:5px; border-radius:10px;">
                    <button class="btn-sm" onclick="editTime('${id}', ${item.expiry}, 1)">+D</button>
                    <button class="btn-sm" onclick="editTime('${id}', ${item.expiry}, -1)">-D</button>
                    <button class="btn-sm" onclick="resetHWID('${id}')">↺</button>
                    <button class="btn-sm btn-del" onclick="delKey('${id}')">✕</button>
                </div>`;
            container.appendChild(div);
        });
    }

    async function generateAndSave() {
        const key = 'QA-' + Math.random().toString(36).substring(2, 7).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + 86400;
        await fetch(`${BASE_URL}/keys/${key}.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify({ expiry: expiry, hwid: "" }) });
        fetchData();
    }

    async function editTime(id, current, sign) {
        const days = parseInt(document.getElementById(`qty-${id}`).value) || 0;
        const newExp = current + (sign * days * 86400);
        await fetch(`${BASE_URL}/keys/${id}/expiry.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify(newExp) });
        fetchData();
    }

    async function resetHWID(id) {
        await fetch(`${BASE_URL}/keys/${id}/hwid.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify("") });
        alert("HWID Reset for " + id);
        fetchData();
    }

    async function delKey(id) {
        if(!confirm("Delete?")) return;
        await fetch(`${BASE_URL}/keys/${id}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        fetchData();
    }
</script>
</body>
</html>

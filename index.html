<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOOD | Premium Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --primary: #000000;
            --accent: #007aff;
            --danger: #ff3b30;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--primary); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 420px; margin-top: 40px; }
        
        /* Premium Minimal Card */
        .card { 
            background: var(--surface); 
            padding: 32px; 
            border-radius: 28px; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #000, #444);
            opacity: 0.8;
        }

        h2 { 
            font-weight: 800; 
            letter-spacing: -1px; 
            margin-bottom: 24px; 
            text-align: left; 
            font-size: 24px; 
            text-transform: uppercase;
        }

        label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #888; margin-left: 4px; }

        input, select { 
            width: 100%; 
            background: #fff; 
            border: 1px solid var(--border);
            padding: 14px 18px; 
            border-radius: 16px; 
            color: var(--primary); 
            margin: 8px 0 16px 0;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,0,0,0.03); }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-main:active { transform: scale(0.96); }

        /* Key List Styling - Cool List */
        .key-item { 
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }
        .key-item:hover { transform: scale(1.02); }

        .key-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .key-name { font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }
        .countdown { 
            font-size: 11px; 
            color: white; 
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700; 
        }

        /* Control Group Layout */
        .control-group { display: flex; gap: 6px; align-items: center; }
        .input-mini { width: 60px !important; margin: 0 !important; padding: 10px !important; text-align: center; font-weight: 700; border-radius: 12px !important; }
        
        .btn-tool { width: auto; flex: 1; padding: 12px; background: #fff; color: var(--primary); border: 1px solid var(--border); border-radius: 12px; font-size: 11px; }
        .btn-tool:hover { background: #000; color: #fff; }
        .btn-del { color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.1); background: rgba(255, 59, 48, 0.03); }
        .btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }

        #toast { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 28px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast">SYSTEM UPDATED</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>Auth System</h2>
        <label>Access Code</label>
        <input type="password" id="adminPass" placeholder="••••">
        <button class="btn-main" onclick="checkLogin()">IDENTIFY</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Generate</h2>
            <label>Validity Period</label>
            <select id="duration">
                <option value="1">1 DAY ACCESS</option>
                <option value="7">7 DAYS ACCESS</option>
                <option value="30">30 DAYS ACCESS</option>
            </select>
            <button class="btn-main" onclick="generateAndSave()">CREATE NEW KEY</button>
        </div>

        <div id="list-container"></div>
    </div>
</div>

<script>
    const DB_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app/keys";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    const ADMIN_PASS = "1122"; 

    let allKeys = {};

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startDataSync();
        } else { alert("ACCESS DENIED"); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function getCountdown(expiry) {
        const now = Math.floor(Date.now() / 1000);
        const diff = expiry - now;
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400);
        const h = Math.floor((diff % 86400) / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        return `${d}D ${h}H ${m}M ${s}S`;
    }

    async function fetchKeys() {
        try {
            const res = await fetch(`${DB_URL}.json?auth=${DB_SECRET}`);
            allKeys = await res.json() || {};
            renderList();
        } catch (e) { console.error("Fetch Error"); }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        const now = Math.floor(Date.now() / 1000);

        for (let id in allKeys) {
            const item = allKeys[id];
            if (item.expiry <= now) {
                deleteKey(id, true);
                continue;
            }

            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-header">
                    <span class="key-name">${id}</span>
                    <span class="countdown" id="timer-${id}">${getCountdown(item.expiry)}</span>
                </div>
                <div class="control-group">
                    <input type="number" class="input-mini" id="val-${id}" value="1">
                    <button class="btn-tool" onclick="updateTime('${id}', ${item.expiry}, 'add')">ADD</button>
                    <button class="btn-tool" onclick="updateTime('${id}', ${item.expiry}, 'sub')">SUB</button>
                    <button class="btn-tool btn-del" onclick="deleteKey('${id}')">DEL</button>
                </div>
            `;
            container.appendChild(div);
        }
    }

    setInterval(() => {
        for (let id in allKeys) {
            const el = document.getElementById(`timer-${id}`);
            if (el) {
                const timeStr = getCountdown(allKeys[id].expiry);
                el.innerText = timeStr;
                if (timeStr === "EXPIRED") fetchKeys();
            }
        }
    }, 1000);

    async function startDataSync() {
        await fetchKeys();
        setInterval(fetchKeys, 8000);
    }

    async function generateAndSave() {
        const days = parseInt(document.getElementById('duration').value);
        const key = 'JOOD-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (days * 86400);

        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, {
            method: 'PUT',
            body: JSON.stringify({ expiry: expiry })
        });
        showToast("NEW KEY CREATED");
        fetchKeys();
    }

    async function updateTime(key, currentExpiry, mode) {
        const days = parseInt(document.getElementById(`val-${key}`).value) || 0;
        const newExpiry = mode === 'add' ? currentExpiry + (days * 86400) : currentExpiry - (days * 86400);

        await fetch(`${DB_URL}/${key}/expiry.json?auth=${DB_SECRET}`, {
            method: 'PUT',
            body: JSON.stringify(newExpiry)
        });
        showToast("DATA UPDATED");
        fetchKeys();
    }

    async function deleteKey(key, silent = false) {
        if (!silent && !confirm("PERMANENTLY DELETE " + key + "?")) return;
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        if (!silent) showToast("KEY REMOVED");
        fetchKeys();
    }
</script>

</body>
</html>

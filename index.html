<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>JOOD | Auto-Sync Key Manager</title>
    <style>
        :root { --bg: #0b0f1a; --primary: #3b82f6; --accent: #10b981; --text: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: #161b2a; padding: 2rem; border-radius: 1rem; width: 100%; max-width: 500px; border: 1px solid #2d3748; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d3748; box-sizing: border-box; }
        input { background: #0b0f1a; color: white; }
        button { cursor: pointer; font-weight: bold; border: none; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-save { background: var(--accent); color: white; }
        .status { font-size: 0.8rem; text-align: center; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h2>JOOD Auto-Sync</h2>
    
    <label>GitHub Token (ได้จากข้อ 1)</label>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
    
    <hr style="border: 0.5px solid #2d3748; margin: 20px 0;">

    <label>สร้าง Key ใหม่</label>
    <select id="duration">
        <option value="7">7 วัน</option>
        <option value="30">30 วัน</option>
    </select>
    <button class="btn-gen" onclick="generateAndAdd()">+ สร้างและเพิ่มในรายการ</button>

    <div id="pendingKeys" style="margin-top: 15px; font-size: 0.9rem; color: var(--accent);"></div>

    <button class="btn-save" onclick="syncToGitHub()">บันทึกข้อมูลไปที่ GitHub ทันที</button>
    <div id="status" class="status">รอการสั่งการ...</div>
</div>

<script>
    let currentData = {};
    const REPO_OWNER = "Nattawatwww";
    const REPO_NAME = "inventory";
    const FILE_PATH = "keys.json";

    async function generateAndAdd() {
        const days = parseInt(document.getElementById('duration').value);
        const key = "JOOD-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (days * 24 * 60 * 60);
        
        // ดึงข้อมูลเก่าก่อน (เพื่อให้แน่ใจว่าไม่ทับของเดิมที่อยู่ในเว็บ)
        document.getElementById('pendingKeys').innerText = "สร้าง Key: " + key + " สำเร็จ (รอการกดบันทึก)";
        currentData[key] = { expiry: expiry };
    }

    async function syncToGitHub() {
        const token = document.getElementById('ghToken').value;
        const status = document.getElementById('status');
        
        if (!token) return alert("กรุณาใส่ GitHub Token ก่อน!");

        status.innerText = "กำลังดึงข้อมูลเดิมจาก GitHub...";
        
        try {
            // 1. ดึงไฟล์เดิมมาเพื่อเอา SHA (GitHub บังคับใช้ SHA ในการอัปเดต)
            const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${token}` }
            });
            const fileData = await getRes.json();
            const oldData = JSON.parse(atob(fileData.content));
            const sha = fileData.sha;

            // 2. รวมข้อมูลใหม่เข้ากับข้อมูลเก่า
            const newData = { ...oldData, ...currentData };

            status.innerText = "กำลังอัปโหลดข้อมูลใหม่...";

            // 3. ส่งข้อมูลกลับไปที่ GitHub
            const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update keys.json via Web Panel",
                    content: btoa(JSON.stringify(newData, null, 2)),
                    sha: sha
                })
            });

            if (putRes.ok) {
                status.innerText = "✅ บันทึกไป GitHub สำเร็จแล้ว!";
                currentData = {}; // ล้างคิวที่รอไว้
                document.getElementById('pendingKeys').innerText = "";
            } else {
                status.innerText = "❌ เกิดข้อผิดพลาดในการบันทึก";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "❌ เชื่อมต่อ GitHub ไม่ได้";
        }
    }
</script>

</body>
</html>
